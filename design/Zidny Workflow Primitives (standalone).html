  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"27288456-3be3-4e8a-a207-d040c8867a98\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"7d01c2b1-b95c-45c0-a04a-7640e7d311c8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"27288456-3be3-4e8a-a207-d040c8867a98\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"7d01c2b1-b95c-45c0-a04a-7640e7d311c8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Self-hosted Bold (uploaded brand file) — authoritative for headings */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"58b159af-3a08-4405-90a9-b90f6b7eb621\") format('truetype');\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   Zidny — Color tokens\n   Palette evokes clarity, optimism and forward-thinking. Sky Blue is the\n   hero; deep navy anchors; cyans/aqua carry the airy \"glass\" surfaces.\n   ========================================================================== */\n\n:root {\n  /* ---- Brand scale (raw) ------------------------------------------------ */\n  --color-sky-blue:      #2AA4E7; /* core brand — logo, buttons, CTAs */\n  --color-primary-blue:  #0A60AD; /* links, hover, illustration accents, gradients */\n  --color-deep-navy:     #0C224B; /* headings, strong accents, dark surfaces */\n  --color-aqua-tint:     #A9EFFB; /* soft UI sections, info cards, input fields */\n  --color-pale-cyan:     #E9FCFF; /* section backgrounds, light cards */\n  --color-warm-cream:    #FFFAE6; /* warm highlight to contrast the blues */\n  --color-light-gray:    #E8EBEF; /* neutral backgrounds, dividers, borders */\n  --color-white:         #FFFFFF;\n\n  /* ---- Extended sky-blue ramp (derived, for states & depth) ------------- */\n  --sky-50:   #EAF6FD;\n  --sky-100:  #CFEAFA;\n  --sky-200:  #A9DAF5;\n  --sky-300:  #76C4EF;\n  --sky-400:  #4FB2EB;\n  --sky-500:  #2AA4E7; /* = Sky Blue */\n  --sky-600:  #1B86C7;\n  --sky-700:  #0A60AD; /* = Primary Blue */\n  --sky-800:  #0B4A82;\n  --sky-900:  #0C224B; /* = Deep Navy */\n\n  /* ---- Neutral ramp ----------------------------------------------------- */\n  --neutral-0:    #FFFFFF;\n  --neutral-50:   #F7F9FB;\n  --neutral-100:  #EEF1F5;\n  --neutral-150:  #E8EBEF; /* = Light Gray */\n  --neutral-200:  #DCE1E8;\n  --neutral-300:  #C2CAD6;\n  --neutral-400:  #9AA5B5;\n  --neutral-500:  #6B7688;\n  --neutral-600:  #4C5667;\n  --neutral-700:  #34404F;\n  --neutral-800:  #1E2A3A;\n  --neutral-900:  #0C224B; /* = Deep Navy */\n\n  /* ---- Semantic: text --------------------------------------------------- */\n  --text-strong:    var(--color-deep-navy);   /* headings */\n  --text-body:      #1E2A3A;                   /* default body */\n  --text-muted:     #5A6678;                   /* secondary / captions */\n  --text-subtle:    #8A96A6;                   /* tertiary / placeholders */\n  --text-on-brand:  #FFFFFF;                   /* text over sky/navy fills */\n  --text-link:      var(--color-primary-blue);\n\n  /* ---- Semantic: surfaces ---------------------------------------------- */\n  --surface-page:      #F4FAFE;  /* app canvas — barely-there cyan wash */\n  --surface-card:      #FFFFFF;\n  --surface-soft:      var(--color-pale-cyan);\n  --surface-info:      var(--color-aqua-tint);\n  --surface-cream:     var(--color-warm-cream);\n  --surface-navy:      var(--color-deep-navy);\n  --surface-sunken:    #EDF3F8;\n\n  /* ---- Semantic: lines ------------------------------------------------- */\n  --border-subtle:   var(--color-light-gray);\n  --border-default:  #DCE1E8;\n  --border-strong:   #C2CAD6;\n  --divider:         #E8EBEF;\n\n  /* ---- Brand / interactive --------------------------------------------- */\n  --brand:            var(--color-sky-blue);\n  --brand-hover:      var(--sky-600);\n  --brand-active:     var(--color-primary-blue);\n  --brand-soft:       var(--sky-50);\n  --focus-ring:       rgba(42, 164, 231, 0.45);\n\n  /* ---- Status ---------------------------------------------------------- */\n  --success:        #1FA971;\n  --success-soft:   #E4F7EF;\n  --warning:        #E8A33D;\n  --warning-soft:   #FFF4E0;\n  --danger:         #E4564E;\n  --danger-soft:    #FBE9E8;\n  --info:           var(--color-sky-blue);\n  --info-soft:      var(--color-pale-cyan);\n\n  /* ---- Brand gradients -------------------------------------------------- */\n  --gradient-sky:    linear-gradient(135deg, #2AA4E7 0%, #0A60AD 100%); /* @kind color */\n  --gradient-aqua:   linear-gradient(135deg, #A9EFFB 0%, #2AA4E7 100%); /* @kind color */\n  --gradient-deep:   linear-gradient(160deg, #0A60AD 0%, #0C224B 100%); /* @kind color */\n  --gradient-wash:   linear-gradient(180deg, #FFFFFF 0%, #E9FCFF 100%); /* @kind color */\n\n  /* ---- Glass tint sources (used by effects.css) ------------------------ */\n  --glass-tint-light:  255, 255, 255;   /* @kind other */\n  --glass-tint-cyan:   233, 252, 255;   /* @kind other */\n  --glass-tint-navy:   12, 34, 75;      /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   Zidny — Typography tokens\n   One typeface: Outfit. Geometric, friendly, confident. Headings are bold\n   and tight; body is regular and roomy.\n   ========================================================================== */\n\n:root {\n  /* ---- Family ----------------------------------------------------------- */\n  --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n  --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;\n  /* No bespoke mono in the brand — use the platform mono for code specimens */\n  --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  /* ---- Weights ---------------------------------------------------------- */\n  --weight-light:    300;\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-extra:    800;\n\n  /* ---- Type scale (1.250 major-third-ish, tuned) ----------------------- */\n  --text-2xs:  11px;\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-md:   18px;\n  --text-lg:   20px;\n  --text-xl:   24px;\n  --text-2xl:  30px;\n  --text-3xl:  38px;\n  --text-4xl:  48px;\n  --text-5xl:  60px;\n  --text-6xl:  76px;\n\n  /* ---- Line heights ----------------------------------------------------- */\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---- Letter spacing --------------------------------------------------- */\n  --tracking-tight:  -0.02em;  /* large display */\n  --tracking-snug:   -0.01em;  /* headings */\n  --tracking-normal: 0em;\n  --tracking-wide:   0.04em;   /* eyebrows / all-caps labels */\n  --tracking-wider:  0.12em;\n\n  /* ---- Semantic roles --------------------------------------------------- */\n  --display-size:    var(--text-6xl);\n  --display-weight:  var(--weight-bold);\n  --display-leading: var(--leading-tight);\n\n  --h1-size: var(--text-4xl);\n  --h2-size: var(--text-3xl);\n  --h3-size: var(--text-2xl);\n  --h4-size: var(--text-xl);\n\n  --body-size:   var(--text-base);\n  --body-leading: var(--leading-relaxed);\n\n  --eyebrow-size:    var(--text-xs);\n  --eyebrow-weight:  var(--weight-semibold);\n  --eyebrow-tracking: var(--tracking-wide);\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   Zidny — Spacing, radii & layout tokens\n   8pt-based rhythm. Generous, airy spacing supports the light glass look.\n   ========================================================================== */\n\n:root {\n  /* ---- Spacing scale (8pt base, with 2/4 micro-steps) ------------------ */\n  --space-0:   0;\n  --space-1:   2px;\n  --space-2:   4px;\n  --space-3:   8px;\n  --space-4:   12px;\n  --space-5:   16px;\n  --space-6:   20px;\n  --space-7:   24px;\n  --space-8:   32px;\n  --space-9:   40px;\n  --space-10:  48px;\n  --space-11:  64px;\n  --space-12:  80px;\n  --space-13:  96px;\n  --space-14:  128px;\n\n  /* ---- Radii — soft, Apple-like rounding -------------------------------- */\n  --radius-xs:   6px;\n  --radius-sm:   10px;\n  --radius-md:   14px;   /* default control radius */\n  --radius-lg:   20px;   /* cards */\n  --radius-xl:   28px;   /* feature panels, glass surfaces */\n  --radius-2xl:  36px;\n  --radius-pill: 999px;  /* chips, avatars, pills */\n  --radius-round: 50%;\n\n  /* ---- Container widths ------------------------------------------------- */\n  --container-sm:  640px;\n  --container-md:  840px;\n  --container-lg:  1080px;\n  --container-xl:  1280px;\n  --container-2xl: 1440px;\n\n  /* ---- Z-index ladder --------------------------------------------------- */\n  --z-base:     0;   /* @kind other */\n  --z-raised:   10;  /* @kind other */\n  --z-sticky:   100; /* @kind other */\n  --z-overlay:  900; /* @kind other */\n  --z-modal:    1000; /* @kind other */\n  --z-toast:    1100; /* @kind other */\n  --z-tooltip:  1200; /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   Zidny — Effects: glass, shadows, blur, motion\n   This is the heart of the Zidny look: Apple \"liquid glass\" — translucent\n   frosted surfaces, soft layered shadows, generous backdrop blur, and a\n   bright specular hairline on top edges.\n   ========================================================================== */\n\n:root {\n  /* ---- Backdrop blur strengths ----------------------------------------- */\n  --blur-xs:  6px;\n  --blur-sm:  12px;\n  --blur-md:  20px;   /* default glass */\n  --blur-lg:  32px;\n  --blur-xl:  48px;\n\n  /* ---- Glass fills (translucent tints) --------------------------------- */\n  --glass-light:    rgba(255, 255, 255, 0.55);   /* on busy/photo bgs */\n  --glass-light-hi: rgba(255, 255, 255, 0.72);   /* more opaque card */\n  --glass-cyan:     rgba(233, 252, 255, 0.55);\n  --glass-aqua:     rgba(169, 239, 251, 0.40);\n  --glass-navy:     rgba(12, 34, 75, 0.55);      /* dark glass over bright bg */\n  --glass-navy-hi:  rgba(12, 34, 75, 0.72);\n\n  /* ---- Glass hairlines (the bright/dark edge that sells the material) --- */\n  --glass-border-light: rgba(255, 255, 255, 0.65);\n  --glass-border-soft:  rgba(255, 255, 255, 0.35);\n  --glass-border-navy:  rgba(255, 255, 255, 0.14);\n  --glass-inner-top:    inset 0 1px 0 rgba(255, 255, 255, 0.6);   /* @kind shadow */\n  --glass-inner-bottom: inset 0 -1px 0 rgba(12, 34, 75, 0.04);     /* @kind shadow */\n\n  /* ---- Elevation shadows (soft, blue-cast, never harsh black) ----------- */\n  --shadow-xs:  0 1px 2px rgba(12, 34, 75, 0.06);\n  --shadow-sm:  0 2px 8px rgba(12, 34, 75, 0.08);\n  --shadow-md:  0 8px 24px rgba(12, 34, 75, 0.10);\n  --shadow-lg:  0 18px 48px rgba(12, 34, 75, 0.14);\n  --shadow-xl:  0 32px 80px rgba(12, 34, 75, 0.18);\n\n  /* Glass cards combine a drop shadow + the specular inner top hairline */\n  --shadow-glass:    0 12px 40px rgba(12, 34, 75, 0.12), var(--glass-inner-top);\n  --shadow-glass-lg: 0 28px 70px rgba(12, 34, 75, 0.18), var(--glass-inner-top);\n\n  /* Brand-tinted glow for hero CTAs and focus moments */\n  --glow-brand: 0 8px 28px rgba(42, 164, 231, 0.40);\n  --glow-aqua:  0 0 0 6px rgba(169, 239, 251, 0.35);\n\n  /* ---- Composed reusable glass \"recipes\" ------------------------------- */\n  /* Apply these custom properties as a group on an element via the helper\n     utility classes in this file, or read them in JSX/inline styles. */\n\n  /* ---- Motion ----------------------------------------------------------- */\n  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1);   /* @kind other */\n  --ease-emphasis: cubic-bezier(0.34, 1.56, 0.64, 1);   /* @kind other */\n  --ease-in-out:   cubic-bezier(0.45, 0, 0.55, 1);      /* @kind other */\n  --duration-fast: 120ms;  /* @kind other */\n  --duration-base: 220ms;  /* @kind other */\n  --duration-slow: 360ms;  /* @kind other */\n}\n\n/* ==========================================================================\n   Glass utility classes — convenience helpers consumers may use directly.\n   Components reference the tokens above rather than these classes.\n   ========================================================================== */\n\n.z-glass {\n  background: var(--glass-light);\n  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(180%);\n  backdrop-filter: blur(var(--blur-md)) saturate(180%);\n  border: 1px solid var(--glass-border-light);\n  box-shadow: var(--shadow-glass);\n  border-radius: var(--radius-xl);\n}\n\n.z-glass--cyan {\n  background: var(--glass-cyan);\n}\n\n.z-glass--navy {\n  background: var(--glass-navy);\n  border-color: var(--glass-border-navy);\n  color: var(--text-on-brand);\n}\n\n.z-glass--strong {\n  background: var(--glass-light-hi);\n  -webkit-backdrop-filter: blur(var(--blur-lg)) saturate(200%);\n  backdrop-filter: blur(var(--blur-lg)) saturate(200%);\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   Zidny — Base layer\n   Light, opinionated defaults. Sets the typeface, smoothing and a few\n   element baselines so specimens and kits inherit the brand automatically.\n   Intentionally minimal — not a full reset.\n   ========================================================================== */\n\nhtml {\n  -webkit-text-size-adjust: 100%;\n  text-size-adjust: 100%;\n}\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--body-size);\n  line-height: var(--body-leading);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  font-synthesis: none;\n}\n\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-display);\n  color: var(--text-strong);\n  font-weight: var(--weight-bold);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-snug);\n  margin: 0 0 0.5em;\n}\n\na {\n  color: var(--text-link);\n  text-decoration: none;\n}\na:hover { color: var(--brand-hover); }\n\np { margin: 0 0 1em; text-wrap: pretty; }\n\n::selection {\n  background: var(--color-aqua-tint);\n  color: var(--color-deep-navy);\n}\n\n*:focus-visible {\n  outline: 3px solid var(--focus-ring);\n  outline-offset: 2px;\n}\n\ncode, kbd, samp {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   Zidny — Component styles\n   Class-based styling for the React primitives. Components apply these\n   classes; all visuals derive from the design tokens. Imported by styles.css\n   so consumers get the full system from one link.\n   ========================================================================== */\n\n/* ---------------------------------------------------------------- Button -- */\n.z-btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  height: 44px; padding: 0 20px;\n  font-family: var(--font-sans); font-weight: 600; font-size: var(--text-sm);\n  line-height: 1; letter-spacing: 0.005em; white-space: nowrap;\n  border: 1px solid transparent; border-radius: var(--radius-pill);\n  cursor: pointer; user-select: none; text-decoration: none;\n  transition: transform var(--duration-fast) var(--ease-standard),\n              background var(--duration-base) var(--ease-standard),\n              box-shadow var(--duration-base) var(--ease-standard),\n              border-color var(--duration-base) var(--ease-standard),\n              color var(--duration-base) var(--ease-standard);\n}\n.z-btn:active { transform: translateY(1px) scale(0.985); }\n.z-btn:disabled, .z-btn[aria-disabled=\"true\"] { opacity: .45; cursor: not-allowed; transform: none; }\n\n.z-btn--sm { height: 36px; padding: 0 14px; font-size: var(--text-xs); }\n.z-btn--lg { height: 54px; padding: 0 28px; font-size: var(--text-base); }\n.z-btn--block { display: flex; width: 100%; }\n\n/* primary — solid sky, brand glow */\n.z-btn--primary { background: var(--color-sky-blue); color: #fff; box-shadow: 0 6px 18px rgba(42,164,231,.32); }\n.z-btn--primary:hover { background: var(--brand-hover); box-shadow: var(--glow-brand); }\n\n/* secondary — soft tinted */\n.z-btn--secondary { background: var(--sky-50); color: var(--color-primary-blue); border-color: var(--sky-100); }\n.z-btn--secondary:hover { background: var(--sky-100); border-color: var(--sky-200); }\n\n/* glass — frosted, for use over imagery/color */\n.z-btn--glass {\n  background: var(--glass-light); color: var(--color-deep-navy);\n  border-color: var(--glass-border-light); box-shadow: var(--shadow-glass);\n  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(180%);\n  backdrop-filter: blur(var(--blur-md)) saturate(180%);\n}\n.z-btn--glass:hover { background: var(--glass-light-hi); }\n\n/* ghost — text only */\n.z-btn--ghost { background: transparent; color: var(--color-primary-blue); }\n.z-btn--ghost:hover { background: var(--sky-50); }\n\n/* danger */\n.z-btn--danger { background: var(--danger); color: #fff; box-shadow: 0 6px 18px rgba(228,86,78,.3); }\n.z-btn--danger:hover { filter: brightness(0.95); }\n\n/* ------------------------------------------------------------ IconButton -- */\n.z-iconbtn {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 44px; height: 44px; flex: none;\n  border: 1px solid transparent; border-radius: var(--radius-md);\n  background: transparent; color: var(--text-muted); cursor: pointer;\n  transition: background var(--duration-base) var(--ease-standard),\n              color var(--duration-base) var(--ease-standard),\n              transform var(--duration-fast) var(--ease-standard);\n}\n.z-iconbtn:hover { background: var(--sky-50); color: var(--color-primary-blue); }\n.z-iconbtn:active { transform: scale(0.92); }\n.z-iconbtn--sm { width: 36px; height: 36px; border-radius: var(--radius-sm); }\n.z-iconbtn--glass { background: var(--glass-light); border-color: var(--glass-border-light); box-shadow: var(--shadow-sm); -webkit-backdrop-filter: blur(var(--blur-md)); backdrop-filter: blur(var(--blur-md)); color: var(--color-deep-navy); }\n.z-iconbtn--solid { background: var(--color-sky-blue); color: #fff; }\n.z-iconbtn--solid:hover { background: var(--brand-hover); color: #fff; }\n\n/* ------------------------------------------------------------------ Card -- */\n.z-card {\n  background: var(--surface-card); border: 1px solid var(--border-subtle);\n  border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);\n  transition: box-shadow var(--duration-base) var(--ease-standard),\n              transform var(--duration-base) var(--ease-standard);\n}\n.z-card--pad { padding: var(--space-7); }\n.z-card--soft { background: var(--surface-soft); border-color: transparent; }\n.z-card--info { background: var(--surface-info); border-color: transparent; }\n.z-card--interactive { cursor: pointer; }\n.z-card--interactive:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }\n.z-card--glass {\n  background: var(--glass-light); border-color: var(--glass-border-light);\n  box-shadow: var(--shadow-glass); border-radius: var(--radius-xl);\n  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(180%);\n  backdrop-filter: blur(var(--blur-md)) saturate(180%);\n}\n.z-card--glass-navy {\n  background: var(--glass-navy); color: #fff;\n  border-color: var(--glass-border-navy); box-shadow: var(--shadow-glass-lg);\n  border-radius: var(--radius-xl);\n  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(180%);\n  backdrop-filter: blur(var(--blur-md)) saturate(180%);\n}\n\n/* ----------------------------------------------------------------- Badge -- */\n.z-badge {\n  display: inline-flex; align-items: center; gap: 5px;\n  height: 24px; padding: 0 10px; border-radius: var(--radius-pill);\n  font-family: var(--font-sans); font-weight: 600; font-size: var(--text-2xs);\n  letter-spacing: .01em; line-height: 1; white-space: nowrap;\n}\n.z-badge--neutral { background: var(--neutral-100); color: var(--text-muted); }\n.z-badge--brand   { background: var(--sky-50); color: var(--color-primary-blue); }\n.z-badge--solid   { background: var(--color-sky-blue); color: #fff; }\n.z-badge--success { background: var(--success-soft); color: var(--success); }\n.z-badge--warning { background: var(--warning-soft); color: #9A6A12; }\n.z-badge--danger  { background: var(--danger-soft); color: var(--danger); }\n.z-badge--dot::before { content: \"\"; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }\n\n/* ------------------------------------------------------------------- Tag -- */\n.z-tag {\n  display: inline-flex; align-items: center; gap: 6px;\n  height: 30px p navy anchors; cyans/aqua carry the airy \"glass\" surfaces.\n   ========================================================================== */\n\n:root {\n  /* ---- Brand scale (raw) ------------------------------------------------ */\n  --color-sky-blue:      #2AA4E7; /* core brand — logo, buttons, CTAs */\n  --color-primary-blue:  #0A60AD; /* links, hover, illustration accents, gradients */\n  --color-deep-navy:     #0C224B; /* headings, strong accents, dark surfaces */\n  --color-aqua-tint:     #A9EFFB; /* soft UI sections, info cards, input fields */\n  --color-pale-cyan:     #E9FCFF; /* section backgrounds, light cards */\n  --color-warm-cream:    #FFFAE6; /* warm highlight to contrast the blues */\n  --color-light-gray:    #E8EBEF; /* neutral backgrounds, dividers, borders */\n  --color-white:         #FFFFFF;\n\n  /* ---- Extended sky-blue ramp (derived, for states & depth) ------------- */\n  --sky-50:   #EAF6FD;\n  --sky-100:  #CFEAFA;\n  --sky-200:  #A9DAF5;\n  --sky-300:  #76C4EF;\n  --sky-400:  #4FB2EB;\n  --sky-500:  #2AA4E7; /* = Sky Blue */\n  --sky-600:  #1B86C7;\n  --sky-700:  #0A60AD; /* = Primary Blue */\n  --sky-800:  #0B4A82;\n  --sky-900:  #0C224B; /* = Deep Navy */\n\n  /* ---- Neutral ramp ----------------------------------------------------- */\n  --neutral-0:    #FFFFFF;\n  --neutral-50:   #F7F9FB;\n  --neutral-100:  #EEF1F5;\n  --neutral-150:  #E8EBEF; /* = Light Gray */\n  --neutral-200:  #DCE1E8;\n  --neutral-300:  #C2CAD6;\n  --neutral-400:  #9AA5B5;\n  --neutral-500:  #6B7688;\n  --neutral-600:  #4C5667;\n  --neutral-700:  #34404F;\n  --neutral-800:  #1E2A3A;\n  --neutral-900:  #0C224B; /* = Deep Navy */\n\n  /* ---- Semantic: text --------------------------------------------------- */\n  --text-strong:    var(--color-deep-navy);   /* headings */\n  --text-body:      #1E2A3A;                   /* default body */\n  --text-muted:     #5A6678;                   /* secondary / captions */\n  --text-subtle:    #8A96A6;                   /* tertiary / placeholders */\n  --text-on-brand:  #FFFFFF;                   /* text over sky/navy fills */\n  --text-link:      var(--color-primary-blue);\n\n  /* ---- Semantic: surfaces ---------------------------------------------- */\n  --surface-page:      #F4FAFE;  /* app canvas — barely-there cyan wash */\n  --surface-card:      #FFFFFF;\n  --surface-soft:      var(--color-pale-cyan);\n  --surface-info:      var(--color-aqua-tint);\n  --surface-cream:     var(--color-warm-cream);\n  --surface-navy:      var(--color-deep-navy);\n  --surface-sunken:    #EDF3F8;\n\n  /* ---- Semantic: lines ------------------------------------------------- */\n  --border-subtle:   var(--color-light-gray);\n  --border-default:  #DCE1E8;\n  --border-strong:   #C2CAD6;\n  --divider:         #E8EBEF;\n\n  /* ---- Brand / interactive --------------------------------------------- */\n  --brand:            var(--color-sky-blue);\n  --brand-hover:      var(--sky-600);\n  --brand-active:     var(--color-primary-blue);\n  --brand-soft:       var(--sky-50);\n  --focus-ring:       rgba(42, 164, 231, 0.45);\n\n  /* ---- Status ---------------------------------------------------------- */\n  --success:        #1FA971;\n  --success-soft:   #E4F7EF;\n  --warning:        #E8A33D;\n  --warning-soft:   #FFF4E0;\n  --danger:         #E4564E;\n  --danger-soft:    #FBE9E8;\n  --info:           var(--color-sky-blue);\n  --info-soft:      var(--color-pale-cyan);\n\n  /* ---- Brand gradients -------------------------------------------------- */\n  --gradient-sky:    linear-gradient(135deg, #2AA4E7 0%, #0A60AD 100%); /* @kind color */\n  --gradient-aqua:   linear-gradient(135deg, #A9EFFB 0%, #2AA4E7 100%); /* @kind color */\n  --gradient-deep:   linear-gradient(160deg, #0A60AD 0%, #0C224B 100%); /* @kind color */\n  --gradient-wash:   linear-gradient(180deg, #FFFFFF 0%, #E9FCFF 100%); /* @kind color */\n\n  /* ---- Glass tint sources (used by effects.css) ------------------------ */\n  --glass-tint-light:  255, 255, 255;   /* @kind other */\n  --glass-tint-cyan:   233, 252, 255;   /* @kind other */\n  --glass-tint-navy:   12, 34, 75;      /* @kind other */\n}\n\n/* ==========================================================================\n   Zidny — Typography tokens\n   One typeface: Outfit. Geometric, friendly, confident. Headings are bold\n   and tight; body is regular and roomy.\n   ========================================================================== */\n\n:root {\n  /* ---- Family ----------------------------------------------------------- */\n  --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n  --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;\n  /* No bespoke mono in the brand — use the platform mono for code specimens */\n  --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  /* ---- Weights ---------------------------------------------------------- */\n  --weight-light:    300;\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-extra:    800;\n\n  /* ---- Type scale (1.250 major-third-ish, tuned) ----------------------- */\n  --text-2xs:  11px;\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-md:   18px;\n  --text-lg:   20px;\n  --text-xl:   24px;\n  --text-2xl:  30px;\n  --text-3xl:  38px;\n  --text-4xl:  48px;\n  --text-5xl:  60px;\n  --text-6xl:  76px;\n\n  /* ---- Line heights ----------------------------------------------------- */\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---- Letter spacing --------------------------------------------------- */\n  --tracking-tight:  -0.02em;  /* large display */\n  --tracking-snug:   -0.01em;  /* headings */\n  --tracking-normal: 0em;\n  --tracking-wide:   0.04em;   /* eyebrows / all-caps labels */\n  --tracking-wider:  0.12em;\n\n  /* ---- Semantic roles --------------------------------------------------- */\n  --display-size:    var(--text-6xl);\n  --display-weight:  var(--weight-bold);\n  --display-leading: var(--leading-tight);\n\n  --h1-size: var(--text-4xl);\n  --h2-size: var(--text-3xl);\n  --h3-size: var(--text-2xl);\n  --h4-size: var(--text-xl);\n\n  --body-size:   var(--text-base);\n  --body-leading: var(--leading-relaxed);\n\n  --eyebrow-size:    var(--text-xs);\n  --eyebrow-weight:  var(--weight-semibold);\n  --eyebrow-tracking: var(--tracking-wide);\n}\n\n/* ==========================================================================\n   Zidny — Spacing, radii & layout tokens\n   8pt-based rhythm. Generous, airy spacing supports the light glass look.\n   ========================================================================== */\n\n:root {\n  /* ---- Spacing scale (8pt base, with 2/4 micro-steps) ------------------ */\n  --space-0:   0;\n  --space-1:   2px;\n  --space-2:   4px;\n  --space-3:   8px;\n  --space-4:   12px;\n  --space-5:   16px;\n  --space-6:   20px;\n  --space-7:   24px;\n  --space-8:   32px;\n  --space-9:   40px;\n  --space-10:  48px;\n  --space-11:  64px;\n  --space-12:  80px;\n  --space-13:  96px;\n  --space-14:  128px;\n\n  /* ---- Radii — soft, Apple-like rounding -------------------------------- */\n  --radius-xs:   6px;\n  --radius-sm:   10px;\n  --radius-md:   14px;   /* default control radius */\n  --radius-lg:   20px;   /* cards */\n  --radius-xl:   28px;   /* feature panels, glass surfaces */\n  --radius-2xl:  36px;\n  --radius-pill: 999px;  /* chips, avatars, pills */\n  --radius-round: 50%;\n\n  /* ---- Container widths ------------------------------------------------- */\n  --container-sm:  640px;\n  --container-md:  840px;\n  --container-lg:  1080px;\n  --container-xl:  1280px;\n  --container-2xl: 1440px;\n\n  /* ---- Z-index ladder --------------------------------------------------- */\n  --z-base:     0;   /* @kind other */\n  --z-raised:   10;  /* @kind other */\n  --z-sticky:   100; /* @kind other */\n  --z-overlay:  900; /* @kind other */\n  --z-modal:    1000; /* @kind other */\n  --z-toast:    1100; /* @kind other */\n  --z-tooltip:  1200; /* @kind other */\n}\n\n/* ==========================================================================\n   Zidny — Effects: glass, shadows, blur, motion\n   This is the heart of the Zidny look: Apple \"liquid glass\" — translucent\n   frosted surfaces, soft layered shadows, generous backdrop blur, and a\n   bright specular hairline on top edges.\n   ========================================================================== */\n\n:root {\n  /* ---- Backdrop blur strengths ----------------------------------------- */\n  --blur-xs:  6px;\n  --blur-sm:  12px;\n  --blur-md:  20px;   /* default glass */\n  --blur-lg:  32px;\n  --blur-xl:  48px;\n\n  /* ---- Glass fills (translucent tints) --------------------------------- */\n  --glass-light:    rgba(255, 255, 255, 0.55);   /* on busy/photo bgs */\n  --glass-light-hi: rgba(255, 255, 255, 0.72);   /* more opaque card */\n  --glass-cyan:     rgba(233, 252, 255, 0.55);\n  --glass-aqua:     rgba(169, 239, 251, 0.40);\n  --glass-navy:     rgba(12, 34, 75, 0.55);      /* dark glass over bright bg */\n  --glass-navy-hi:  rgba(12, 34, 75, 0.72);\n\n  /* ---- Glass hairlines (the bright/dark edge that sells the material) --- */\n  --glass-border-light: rgba(255, 255, 255, 0.65);\n  --glass-border-soft:  rgba(255, 255, 255, 0.35);\n  --glass-border-navy:  rgba(255, 255, 255, 0.14);\n  --glass-inner-top:    inset 0 1px 0 rgba(255, 255, 255, 0.6);   /* @kind shadow */\n  --glass-inner-bottom: inset 0 -1px 0 rgba(12, 34, 75, 0.04);     /* @kind shadow */\n\n  /* ---- Elevation shadows (soft, blue-cast, never harsh black) ----------- */\n  --shadow-xs:  0 1px 2px rgba(12, 34, 75, 0.06);\n  --shadow-sm:  0 2px 8px rgba(12, 34, 75, 0.08);\n  --shadow-md:  0 8px 24px rgba(12, 34, 75, 0.10);\n  --shadow-lg:  0 18px 48px rgba(12, 34, 75, 0.14);\n  --shadow-xl:  0 32px 80px rgba(12, 34, 75, 0.18);\n\n  /* Glass cards combine a drop shadow + the specular inner top hairline */\n  --shadow-glass:    0 12px 40px rgba(12, 34, 75, 0.12), var(--glass-inner-top);\n  --shadow-glass-lg: 0 28px 70px rgba(12, 34, 75, 0.18), var(--glass-inner-top);\n\n  /* Brand-tinted glow for hero CTAs and focus moments */\n  --glow-brand: 0 8px 28px rgba(42, 164, 231, 0.40);\n  --glow-aqua:  0 0 0 6px rgba(169, 239, 251, 0.35);\n\n  /* ---- Composed reusable glass \"recipes\" ------------------------------- */\n  /* Apply these custom properties as a group on an element via the helper\n     utility classes in this file, or read them in JSX/inline styles. */\n\n  /* ---- Motion ----------------------------------------------------------- */\n  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1);   /* @kind other */\n  --ease-emphasis: cubic-bezier(0.34, 1.56, 0.64, 1);   /* @kind other */\n  --ease-in-out:   cubic-bezier(0.45, 0, 0.55, 1);      /* @kind other */\n  --duration-fast: 120ms;  /* @kind other */\n  --duration-base: 220ms;  /* @kind other */\n  --duration-slow: 360ms;  /* @kind other */\n}\n\n/* ==========================================================================\n   Glass utility classes — convenience helpers consumers may use directly.\n   Components reference the tokens above rather than these classes.\n   ========================================================================== */\n\n.z-glass {\n  background: var(--glass-light);\n  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(180%);\n  backdrop-filter: blur(var(--blur-md)) saturate(180%);\n  border: 1px solid var(--glass-border-light);\n  box-shadow: var(--shadow-glass);\n  border-radius: var(--radius-xl);\n}\n\n.z-glass--cyan {\n  background: var(--glass-cyan);\n}\n\n.z-glass--navy {\n  background: var(--glass-navy);\n  border-color: var(--glass-border-navy);\n  color: var(--text-on-brand);\n}\n\n.z-glass--strong {\n  background: var(--glass-light-hi);\n  -webkit-backdrop-filter: blur(var(--blur-lg)) saturate(200%);\n  backdrop-filter: blur(var(--blur-lg)) saturate(200%);\n}\n\n/* ==========================================================================\n   Zidny — Base layer\n   Light, opinionated defaults. Sets the typeface, smoothing and a few\n   element baselines so specimens and kits inherit the brand automatically.\n   Intentionally minimal — not a full reset.\n   ========================================================================== */\n\nhtml {\n  -webkit-text-size-adjust: 100%;\n  text-size-adjust: 100%;\n}\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--body-size);\n  line-height: var(--body-leading);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  font-synthesis: none;\n}\n\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-display);\n  color: var(--text-strong);\n  font-weight: var(--weight-bold);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-snug);\n  margin: 0 0 0.5em;\n}\n\na {\n  color: var(--text-link);\n  text-decoration: none;\n}\na:hover { color: var(--brand-hover); }\n\np { margin: 0 0 1em; text-wrap: pretty; }\n\n::selection {\n  background: var(--color-aqua-tint);\n  color: var(--color-deep-navy);\n}\n\n*:focus-visible {\n  outline: 3px solid var(--focus-ring);\n  outline-offset: 2px;\n}\n\ncode, kbd, samp {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n\n/* ==========================================================================\n   Zidny — Component styles\n   Class-based styling for the React primitives. Components apply these\n   classes; all visuals derive from the design tokens. Imported by styles.css\n   so consumers get the full system from one link.\n   ========================================================================== */\n\n/* ---------------------------------------------------------------- Button -- */\n.z-btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  height: 44px; padding: 0 20px;\n  font-family: var(--font-sans); font-weight: 600; font-size: var(--text-sm);\n  line-height: 1; letter-spacing: 0.005em; white-space: nowrap;\n  border: 1px solid transparent; border-radius: var(--radius-pill);\n  cursor: pointer; user-select: none; text-decoration: none;\n  transition: transform var(--duration-fast) var(--ease-standard),\n              background var(--duration-base) var(--ease-standard),\n              box-shadow var(--duration-base) var(--ease-standard),\n              border-color var(--duration-base) var(--ease-standard),\n              color var(--duration-base) var(--ease-standard);\n}\n.z-btn:active { transform: translateY(1px) scale(0.985); }\n.z-btn:disabled, .z-btn[aria-disabled=\"true\"] { opacity: .45; cursor: not-allowed; transform: none; }\n\n.z-btn--sm { height: 36px; padding: 0 14px; font-size: var(--text-xs); }\n.z-btn--lg { height: 54px; padding: 0 28px; font-size: var(--text-base); }\n.z-btn--block { display: flex; width: 100%; }\n\n/* primary — solid sky, brand glow */\n.z-btn--primary { background: var(--color-sky-blue); color: #fff; box-shadow: 0 6px 18px rgba(42,164,231,.32); }\n.z-btn--primary:hover { background: var(--brand-hover); box-shadow: var(--glow-brand); }\n\n/* secondary — soft tinted */\n.z-btn--secondary { background: var(--sky-50); color: var(--color-primary-blue); border-color: var(--sky-100); }\n.z-btn--secondary:hover { background: var(--sky-100); border-color: var(--sky-200); }\n\n/* glass — frosted, for use over imagery/color */\n.z-btn--glass {\n  background: var(--glass-light); color: var(--color-deep-navy);\n  border-color: var(--glass-border-light); box-shadow: var(--shadow-glass);\n  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(180%);\n  backdrop-filter: blur(var(--blur-md)) saturate(180%);\n}\n.z-btn--glass:hover { background: var(--glass-light-hi); }\n\n/* ghost — text only */\n.z-btn--ghost { background: transparent; color: var(--color-primary-blue); }\n.z-btn--ghost:hover { background: var(--sky-50); }\n\n/* danger */\n.z-btn--danger { background: var(--danger); color: #fff; box-shadow: 0 6px 18px rgba(228,86,78,.3); }\n.z-btn--danger:hover { filter: brightness(0.95); }\n\n/* ------------------------------------------------------------ IconButton -- */\n.z-iconbtn {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 44px; height: 44px; flex: none;\n  border: 1px solid transparent; border-radius: var(--radius-md);\n  background: transparent; color: var(--text-muted); cursor: pointer;\n  transition: background var(--duration-base) var(--ease-standard),\n              color var(--duration-base) var(--ease-standard),\n              transform var(--duration-fast) var(--ease-standard);\n}\n.z-iconbtn:hover { background: var(--sky-50); color: var(--color-primary-blue); }\n.z-iconbtn:active { transform: scale(0.92); }\n.z-iconbtn--sm { width: 36px; height: 36px; border-radius: var(--radius-sm); }\n.z-iconbtn--glass { background: var(--glass-light); border-color: var(--glass-border-light); box-shadow: var(--shadow-sm); -webkit-backdrop-filter: blur(var(--blur-md)); backdrop-filter: blur(var(--blur-md)); color: var(--color-deep-navy); }\n.z-iconbtn--solid { background: var(--color-sky-blue); color: #fff; }\n.z-iconbtn--solid:hover { background: var(--brand-hover); color: #fff; }\n\n/* ------------------------------------------------------------------ Card -- */\n.z-card {\n  background: var(--surface-card); border: 1px solid var(--border-subtle);\n  border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);\n  transition: box-shadow var(--duration-base) var(--ease-standard),\n              transform var(--duration-base) var(--ease-standard);\n}\n.z-card--pad { padding: var(--space-7); }\n.z-card--soft { background: var(--surface-soft); border-color: transparent; }\n.z-card--info { background: var(--surface-info); border-color: transparent; }\n.z-card--interactive { cursor: pointer; }\n.z-card--interactive:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }\n.z-card--glass {\n  background: var(--glass-light); border-color: var(--glass-border-light);\n  box-shadow: var(--shadow-glass); border-radius: var(--radius-xl);\n  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(180%);\n  backdrop-filter: blur(var(--blur-md)) saturate(180%);\n}\n.z-card--glass-navy {\n  background: var(--glass-navy); color: #fff;\n  border-color: var(--glass-border-navy); box-shadow: var(--shadow-glass-lg);\n  border-radius: var(--radius-xl);\n  -webkit-backdrop-filter: blur(var(--blur-md)) saturate(180%);\n  backdrop-filter: blur(var(--blur-md)) saturate(180%);\n}\n\n/* ----------------------------------------------------------------- Badge -- */\n.z-badge {\n  display: inline-flex; align-items: center; gap: 5px;\n  height: 24px; padding: 0 10px; border-radius: var(--radius-pill);\n  font-family: var(--font-sans); font-weight: 600; font-size: var(--text-2xs);\n  letter-spacing: .01em; line-height: 1; white-space: nowrap;\n}\n.z-badge--neutral { background: var(--neutral-100); color: var(--text-muted); }\n.z-badge--brand   { background: var(--sky-50); color: var(--color-primary-blue); }\n.z-badge--solid   { background: var(--color-sky-blue); color: #fff; }\n.z-badge--success { background: var(--success-soft); color: var(--success); }\n.z-badge--warning { background: var(--warning-soft); color: #9A6A12; }\n.z-badge--danger  { background: var(--danger-soft); color: var(--danger); }\n.z-badge--dot::before { content: \"\"; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }\n\n/* ------------------------------------------------------------------- Tag -- */\n.z-tag {\n  display: inline-flex; align-items: center; gap: 6px;\n  height: 30px; padding: 0 12px; border-radius: var(--radius-pill);\n  background: var(--surface-card); border: 1px solid var(--border-default);\n  font-family: var(--font-sans); font-weight: 500; font-size: var(--text-sm);\n  color: var(--text-body); cursor: default;\n  transition: all var(--duration-base) var(--ease-standard);\n}\n.z-tag--selectable { cursor: pointer; }\n.z-tag--selectable:hover { border-color: var(--color-sky-blue); color: var(--color-primary-blue); }\n.z-tag--active { background: var(--sky-50); border-color: var(--color-sky-blue); color: var(--color-primary-blue); }\n.z-tag__x { display: inline-flex; opacity: .5; cursor: pointer; }\n.z-tag__x:hover { opacity: 1; }\n\n/* ---------------------------------------------------------------- Avatar -- */\n.z-avatar {\n  position: relative; display: inline-flex; align-items: center; justify-content: center;\n  border-radius: var(--radius-round); overflow: hidden; flex: none;\n  background: var(--gradient-sky); color: #fff; font-family: var(--font-sans);\n  font-weight: 600; box-shadow: var(--glass-inner-top);\n}\n.z-avatar img { width: 100%; height: 100%; object-fit: cover; }\n.z-avatar--xs { width: 28px; height: 28px; font-size: 11px; }\n.z-avatar--sm { width: 36px; height: 36px; font-size: 13px; }\n.z-avatar--md { width: 48px; height: 48px; font-size: 16px; }\n.z-avatar--lg { width: 64px; height: 64px; font-size: 22px; }\n.z-avatar--xl { width: 96px; height: 96px; font-size: 32px; }\n.z-avatar__status {\n  position: absolute; right: 2px; bottom: 2px; width: 26%; height: 26%;\n  min-width: 9px; min-height: 9px; border-radius: 50%;\n  border: 2px solid #fff; background: var(--neutral-300);\n}\n.z-avatar__status--online { background: var(--success); }\n\n/* ----------------------------------------------------------------- Input -- */\n.z-field { display: flex; flex-direction: column; gap: 6px; font-family: var(--font-sans); }\n.z-field__label { font-size: var(--text-sm); font-weight: 600; color: var(--text-strong); }\n.z-field__hint { font-size: var(--text-xs); color: var(--text-muted); }\n.z-field__hint--error { color: var(--danger); }\n.z-input {\n  width: 100%; box-sizing: border-box; height: 46px; padding: 0 16px;\n  font-family: var(--font-sans); font-size: var(--text-base); color: var(--text-body);\n  background: var(--surface-card); border: 1.5px solid var(--border-default);\n  border-radius: var(--radius-md); outline: none;\n  transition: border-color var(--duration-base) var(--ease-standard),\n              box-shadow var(--duration-base) var(--ease-standard),\n              background var(--duration-base) var(--ease-standard);\n}\n.z-input::placeholder { color: var(--text-subtle); }\n.z-input:hover { border-color: var(--border-strong); }\n.z-input:focus { border-color: var(--color-sky-blue); box-shadow: 0 0 0 4px var(--focus-ring); background: #fff; }\n.z-input--error { border-color: var(--danger); }\n.z-input--error:focus { box-shadow: 0 0 0 4px rgba(228,86,78,.25); }\n.z-input:disabled { background: var(--neutral-50); color: var(--text-subtle); cursor: not-allowed; }\n.z-input--with-icon { padding-left: 44px; }\n.z-input-wrap { position: relative; }\n.z-input-wrap__icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-subtle); pointer-events: none; display: flex; }\ntextarea.z-input { height: auto; padding: 12px 16px; line-height: 1.5; resize: vertical; }\n\n/* ---------------------------------------------------------------- Select -- */\n.z-select {\n  width: 100%; box-sizing: border-box; height: 46px; padding: 0 40px 0 16px;\n  font-family: var(--font-sans); font-size: var(--text-base); color: var(--text-body);\n  background-color: var(--surface-card);\n  background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%235A6678' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/><\u002Fsvg>\");\n  background-repeat: no-repeat; background-position: right 14px center;\n  border: 1.5px solid var(--border-default); border-radius: var(--radius-md);\n  outline: none; cursor: pointer; appearance: none; -webkit-appearance: none;\n  transition: border-color var(--duration-base) var(--ease-standard), box-shadow var(--duration-base) var(--ease-standard);\n}\n.z-select:hover { border-color: var(--border-strong); }\n.z-select:focus { border-color: var(--color-sky-blue); box-shadow: 0 0 0 4px var(--focus-ring); }\n\n/* ---------------------------------------------------------------- Switch -- */\n.z-switch { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; font-family: var(--font-sans); font-size: var(--text-sm); color: var(--text-body); }\n.z-switch__track {\n  position: relative; width: 46px; height: 28px; border-radius: var(--radius-pill);\n  background: var(--neutral-200); transition: background var(--duration-base) var(--ease-standard);\n  flex: none; box-shadow: inset 0 1px 2px rgba(12,34,75,.12);\n}\n.z-switch__thumb {\n  position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%;\n  background: #fff; box-shadow: var(--shadow-sm);\n  transition: transform var(--duration-base) var(--ease-emphasis);\n}\n.z-switch input { position: absolute; opacity: 0; width: 0; height: 0; }\n.z-switch input:checked + .z-switch__track { background: var(--color-sky-blue); }\n.z-switch input:checked + .z-switch__track .z-switch__thumb { transform: translateX(18px); }\n.z-switch input:disabled + .z-switch__track { opacity: .5; }\n\n/* -------------------------------------------------------------- Checkbox -- */\n.z-check { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; font-family: var(--font-sans); font-size: var(--text-base); color: var(--text-body); }\n.z-check__box {\n  width: 22px; height: 22px; flex: none; border-radius: var(--radius-xs);\n  border: 1.5px solid var(--border-strong); background: var(--surface-card);\n  display: inline-flex; align-items: center; justify-content: center;\n  transition: all var(--duration-base) var(--ease-standard); color: #fff;\n}\n.z-check__box svg { opacity: 0; transform: scale(.5); transition: all var(--duration-base) var(--ease-emphasis); }\n.z-check input { position: absolute; opacity: 0; width: 0; height: 0; }\n.z-check input:checked + .z-check__box { background: var(--color-sky-blue); border-color: var(--color-sky-blue); }\n.z-check input:checked + .z-check__box svg { opacity: 1; transform: scale(1); }\n.z-check input:focus-visible + .z-check__box { box-shadow: 0 0 0 4px var(--focus-ring); }\n\n/* ------------------------------------------------------------------ Tabs -- */\n.z-tabs { display: inline-flex; gap: 4px; padding: 5px; border-radius: var(--radius-pill);\n  background: var(--neutral-100); }\n.z-tabs--glass { background: var(--glass-light); border: 1px solid var(--glass-border-light); -webkit-backdrop-filter: blur(var(--blur-md)); backdrop-filter: blur(var(--blur-md)); box-shadow: var(--shadow-sm); }\n.z-tab {\n  appearance: none; border: none; background: transparent; cursor: pointer;\n  font-family: var(--font-sans); font-weight: 600; font-size: var(--text-sm);\n  color: var(--text-muted); padding: 9px 18px; border-radius: var(--radius-pill);\n  transition: all var(--duration-base) var(--ease-standard);\n}\n.z-tab:hover { color: var(--color-primary-blue); }\n.z-tab--active { background: #fff; color: var(--color-primary-blue); box-shadow: var(--shadow-sm); }\n\n/* ----------------------------------------------------------- ProgressBar -- */\n.z-progress { width: 100%; height: 8px; border-radius: var(--radius-pill); background: var(--neutral-150); overflow: hidden; }\n.z-progress__fill { height: 100%; border-radius: var(--radius-pill); background: var(--gradient-sky); transition: width var(--duration-slow) var(--ease-standard); }\n\n/* ----------------------------------------------------------------- Toast -- */\n.z-toast {\n  display: flex; align-items: center; gap: 12px; min-width: 280px; max-width: 420px;\n  padding: 14px 16px; border-radius: var(--radius-lg);\n  background: var(--glass-navy-hi); color: #fff; border: 1px solid var(--glass-border-navy);\n  box-shadow: var(--shadow-lg);\n  -webkit-backdrop-filter: blur(var(--blur-lg)) saturate(160%);\n  backdrop-filter: blur(var(--blur-lg)) saturate(160%);\n  font-family: var(--font-sans);\n}\n.z-toast__icon { display: flex; flex: none; }\n.z-toast__title { font-weight: 600; font-size: var(--text-sm); }\n.z-toast__msg { font-size: var(--text-xs); opacity: .8; margin-top: 1px; }\n.z-toast--success .z-toast__icon { color: #6FE3B0; }\n.z-toast--danger .z-toast__icon { color: #FF9D97; }\n.z-toast--info .z-toast__icon { color: var(--color-aqua-tint); }\n\n/* ---------------------------------------------------------------- Dialog -- */\n.z-dialog-overlay {\n  position: fixed; inset: 0; z-index: var(--z-modal);\n  background: rgba(12,34,75,.32);\n  -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);\n  display: flex; align-items: center; justify-content: center; padding: 24px;\n}\n.z-dialog {\n  width: 100%; max-width: 460px; border-radius: var(--radius-xl);\n  background: var(--glass-light-hi); border: 1px solid var(--glass-border-light);\n  box-shadow: var(--shadow-xl);\n  -webkit-backdrop-filter: blur(var(--blur-xl)) saturate(180%);\n  backdrop-filter: blur(var(--blur-xl)) saturate(180%);\n  padding: var(--space-8); font-family: var(--font-sans);\n}\n.z-dialog__title { font-family: var(--font-display); font-weight: 700; font-size: var(--text-2xl); color: var(--text-strong); margin: 0 0 8px; letter-spacing: -.01em; }\n.z-dialog__body { font-size: var(--text-base); color: var(--text-muted); line-height: 1.6; margin: 0 0 24px; }\n.z-dialog__actions { display: flex; gap: 10px; justify-content: flex-end; }\n\n<\u002Fstyle>\n<script src=\"b4e576ea-2a60-4b7b-960f-fa36299837f6\"><\u002Fscript>\n<style>\n  .zx-chip { display:inline-flex; align-items:center; gap:7px; height:26px; padding:0 12px; border-radius:var(--radius-pill); font-family:'Outfit',sans-serif; font-size:12.5px; font-weight:600; letter-spacing:.01em; line-height:1; white-space:nowrap; border:1px solid transparent; }\n  .zx-chip .zx-dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex:none; }\n  .zx-chip .zx-ico { width:13px; height:13px; flex:none; stroke:currentColor; }\n  .zx-swatch { display:flex; flex-direction:column; gap:10px; padding:18px; border-radius:var(--radius-lg); background:var(--surface-card); border:1px solid var(--border-subtle); box-shadow:var(--shadow-xs); }\n  .zx-note { font-family:'Outfit',sans-serif; font-size:12px; color:var(--text-muted); line-height:1.45; }\n  .zx-lbl { font-family:'Outfit',sans-serif; font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text-subtle); }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; background:var(--surface-page); font-family:'Outfit',sans-serif; color:var(--text-body); padding:48px 56px 80px;\">\n\n  <!-- Masthead -->\n  <div style=\"max-width:1180px; margin:0 auto 40px; display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;\">\n    <div>\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\">\n        <span style=\"font-family:'Outfit',sans-serif; font-weight:700; font-size:20px; letter-spacing:-.01em; color:var(--color-sky-blue);\">ZIDNY<\u002Fspan>\n        <span style=\"width:1px; height:18px; background:var(--border-strong);\"><\u002Fspan>\n        <span class=\"zx-lbl\">Design Workflow · Component Kit<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"margin:0; font-weight:700; font-size:38px; letter-spacing:-.02em; color:var(--text-strong); line-height:1.05;\">Shared Primitives<\u002Fh1>\n      <p style=\"margin:10px 0 0; max-width:560px; font-size:15px; line-height:1.6; color:var(--text-muted);\">The building blocks every screen reuses. Each is grounded in Zidny tokens — no invented colors, type, or spacing. The stage-status chip is the heart of the tool.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n      <span class=\"z-badge z-badge--brand\">3 role views<\u002Fspan>\n      <span class=\"z-badge z-badge--neutral\">Stages 3–5<\u002Fspan>\n      <span class=\"z-badge z-badge--neutral\">Brand · UI/UX · Campaign<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1180px; margin:0 auto; display:flex; flex-direction:column; gap:24px;\">\n\n    <!-- ============ 1. STAGE STATUS CHIP ============ -->\n    <section style=\"background:var(--surface-card); border:1px solid var(--border-subtle); border-radius:var(--radius-xl); box-shadow:var(--shadow-sm); overflow:hidden;\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:16px; padding:24px 28px 18px; border-bottom:1px solid var(--divider);\">\n        <div>\n          <div class=\"zx-lbl\" style=\"color:var(--color-sky-blue);\">01 · The core component<\u002Fdiv>\n          <h2 style=\"margin:6px 0 0; font-weight:700; font-size:22px; letter-spacing:-.01em; color:var(--text-strong);\">Stage-status chip<\u002Fh2>\n        <\u002Fdiv>\n        <div class=\"zx-note\" style=\"max-width:340px; text-align:right;\">Five states of the stage state machine. A freelancer can never self-advance — <em>Approved<\u002Fem> is always an agency action after the validation meeting.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px; padding:24px 28px;\">\n        <!-- In progress -->\n        <div class=\"zx-swatch\">\n          <span class=\"zx-chip\" style=\"background:var(--sky-50); color:var(--color-primary-blue); border-color:var(--sky-100);\"><span class=\"zx-dot\"><\u002Fspan>In progress<\u002Fspan>\n          <div><div class=\"zx-lbl\" style=\"margin-bottom:3px;\">Freelancer working<\u002Fdiv><div class=\"zx-note\">Deliverables open for upload &amp; edit.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Submitted -->\n        <div class=\"zx-swatch\">\n          <span class=\"zx-chip\" style=\"background:var(--color-sky-blue); color:#fff;\">\n            <svg class=\"zx-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Submitted<\u002Fspan>\n          <div><div class=\"zx-lbl\" style=\"margin-bottom:3px;\">Sent for review<\u002Fdiv><div class=\"zx-note\">Deliverables lock. Agency notified.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- In review -->\n        <div class=\"zx-swatch\">\n          <span class=\"zx-chip\" style=\"background:var(--warning-soft); color:#9A6A12; border-color:#F1DCB0;\"><span class=\"zx-dot\"><\u002Fspan>In review<\u002Fspan>\n          <div><div class=\"zx-lbl\" style=\"margin-bottom:3px;\">Validation meeting<\u002Fdiv><div class=\"zx-note\">Agency is holding the review.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Approved -->\n        <div class=\"zx-swatch\">\n          <span class=\"zx-chip\" style=\"background:var(--success-soft); color:var(--success); border-color:#BFE9D6;\">\n            <svg class=\"zx-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Approved<\u002Fspan>\n          <div><div class=\"zx-lbl\" style=\"margin-bottom:3px;\">Next stage unlocked<\u002Fdiv><div class=\"zx-note\">Opens the next stage as In progress.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Sent back -->\n        <div class=\"zx-swatch\">\n          <span class=\"zx-chip\" style=\"background:var(--danger-soft); color:var(--danger); border-color:#F3CEcb;\">\n            <svg class=\"zx-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 14L4 9l5-5\"><\u002Fpath><path
